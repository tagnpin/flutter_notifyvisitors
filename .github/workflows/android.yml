name: 🚀 Flutter CI – Android Debug Build

on:
  push:
    branches: [ stage ]
    paths:
      - 'flutter_notifyvisitors/nv_flutter_sdk_app/android/**'
      - 'flutter_notifyvisitors/nv_flutter_sdk_app/lib/**'
      - 'flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.yaml'
      - 'flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.lock'
      - '.github/workflows/android.yml'

# All flutter commands run inside the Flutter app folder
defaults:
  run:
    working-directory: flutter_notifyvisitors/nv_flutter_sdk_app

jobs:
  build-android-debug:
    name: 🛠️ Build Flutter Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 📁 1. Checkout Source Code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ☕ 2. Setup Java (for Gradle)
      - name: ⚙️ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🐦 3. Install Flutter SDK
      - name: 🧰 Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      # 📦 4. Restore Gradle Cache
      - name: ♻️ Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('flutter_notifyvisitors/nv_flutter_sdk_app/android/**/*.gradle*', 'flutter_notifyvisitors/nv_flutter_sdk_app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 📦 5. Install Flutter Dependencies
      - name: 📦 Install Flutter Dependencies
        run: flutter pub get

      # 🔍 6. Analyzer
      - name: 🔍 Flutter Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # 🧪 7. Run Tests (optional)
      - name: 🧪 Run Flutter Tests
        run: flutter test
        continue-on-error: true

      # 🏗️ 8. Build Android Debug APK
      - name: 🏗️ Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      # 📤 9. Upload APK Artifact
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-debug-apk
          path: flutter_notifyvisitors/nv_flutter_sdk_app/build/app/outputs/flutter-apk/app-debug.apk

      # ☁️ 10. Upload to S3
      - name: ☁️ Upload Debug APK to S3
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          APK_PATH: flutter_notifyvisitors/nv_flutter_sdk_app/build/app/outputs/flutter-apk/app-debug.apk
          S3_DESTINATION: ${{ github.event.repository.name }}/flutter-debug-${{ github.run_number }}.apk
        run: |
          echo "🔄 Checking APK..."
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK not found at $APK_PATH"
            exit 1
          fi

          echo "☁️ Uploading to S3..."
          aws s3 cp "$APK_PATH" "s3://$S3_BUCKET/$S3_DESTINATION"

          APK_URL=$(aws s3 presign "s3://$S3_BUCKET/$S3_DESTINATION" --expires-in 604800)
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT

          echo "### 🚀 Download APK (valid 7 days)  
          $APK_URL" >> $GITHUB_STEP_SUMMARY
