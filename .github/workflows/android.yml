name: Android CI – App Build & Signing
run-name: Android ${{ vars.BUILD_TYPE }} build (commit ${{ github.sha }})

on:
  push:
    branches: [ stage ]
    paths:
      - 'flutter_notifyvisitors/nv_flutter_sdk_app/android/**'
      - 'flutter_notifyvisitors/nv_flutter_sdk_app/lib/**'
      - 'flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.yaml'
      - 'flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.lock'
      - '.github/workflows/android.yml'

jobs:
  build-android:
    name: 🛠️ Build Flutter Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # 📂 All flutter commands run inside the Flutter app folder
    defaults:
      run:
        working-directory: nv_flutter_sdk_app

    env:
      # ============================================================
      # 🔧 Build Configuration
      # ============================================================
      BUILD_TYPE: ${{ vars.BUILD_TYPE }}

      # ============================================================
      # 🔐 Base64 Encoded Configs
      # ============================================================
      FIREBASE_JSON_BASE64: ${{ secrets.ANDROID_FIREBASE_JSON_BASE64 }}
      LOCAL_PROPERTIES: ${{ secrets.ANDROID_LOCAL_PROPERTIES_B64 }}
      KEYSTORE_FILE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      # ============================================================
      # 🏷 Brand / App Configuration
      # ============================================================
      NV_BRAND_ID: ${{ vars.NV_BRAND_ID }}
      NV_BRAND_ENCRYPTION_KEY: ${{ vars.NV_BRAND_ENCRYPTION_KEY }}

      # ============================================================
      # 🔑 Android Signing Secrets
      # ============================================================
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ============================================================
      # ☁️ AWS / S3 Upload
      # ============================================================
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}

    steps:
      # ============================================================
      # STEP 1️⃣  Checkout Source Code 📥
      # ============================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ============================================================
      # STEP 2️⃣  Validate Environment Variables ✅
      # ============================================================
      - name: ✅ Validate Android CI environment variables
        run: |
          set -e

          : "${BUILD_TYPE:?Missing BUILD_TYPE}"
          : "${FIREBASE_JSON_BASE64:?Missing FIREBASE_JSON_BASE64}"

          if [ "$BUILD_TYPE" = "release" ]; then
            : "${KEYSTORE_FILE_BASE64:?Missing KEYSTORE_FILE_BASE64}"
            : "${KEYSTORE_PASSWORD:?Missing KEYSTORE_PASSWORD}"
            : "${KEY_ALIAS:?Missing KEY_ALIAS}"
            : "${KEY_PASSWORD:?Missing KEY_PASSWORD}"
          fi

          : "${NV_BRAND_ID:?Missing NV_BRAND_ID}"
          : "${NV_BRAND_ENCRYPTION_KEY:?Missing NV_BRAND_ENCRYPTION_KEY}"

          : "${AWS_ACCESS_KEY_ID:?Missing AWS_ACCESS_KEY_ID}"
          : "${AWS_SECRET_ACCESS_KEY:?Missing AWS_SECRET_ACCESS_KEY}"
          : "${AWS_DEFAULT_REGION:?Missing AWS_DEFAULT_REGION}"
          : "${S3_BUCKET:?Missing S3_BUCKET}"

          echo "✅ All required environment variables are present"

      # ============================================================
      # STEP 3️⃣  Read Plugin Version 📦
      # ============================================================
      - name: 📦 Extract Plugin Version
        id: extract_plugin_version
        run: |
          set -e

          RAW_VERSION=$(grep '^version:' ../pubspec.yaml | awk '{print $2}')

          PLUGIN_VERSION="${RAW_VERSION%%+*}"
          BUILD_NUMBER="${RAW_VERSION##*+}"

          echo "PLUGIN_VERSION=$PLUGIN_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

          echo "📦 Plugin version detected: $PLUGIN_VERSION ($BUILD_NUMBER)"

      # ============================================================
      # STEP 4️⃣  Setup Java ☕
      # ============================================================
      - name: ⚙️ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ============================================================
      # STEP 5️⃣  Install Flutter SDK 🐦
      # ============================================================
      - name: 🧰 Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      # ============================================================
      # STEP 6️⃣  Cache Gradle Dependencies ♻️
      # ============================================================
      - name: ♻️ Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('flutter_notifyvisitors/nv_flutter_sdk_app/android/**/*.gradle*', 'flutter_notifyvisitors/nv_flutter_sdk_app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ============================================================
      # STEP 7️⃣  Install Flutter Dependencies 📦
      # ============================================================
      - name: 📦 Install Flutter Dependencies
        run: flutter pub get

      # ============================================================
      # STEP 8️⃣  Prepare Firebase & Android Signing 🔐
      # ============================================================
      - name: 🔐 Prepare Firebase & Android signing files
        run: |
          set -e

          mkdir -p android/app
          echo "$FIREBASE_JSON_BASE64" | base64 --decode > android/app/google-services.json
          chmod 600 android/app/google-services.json

          mkdir -p android/app/keystore
          echo "$KEYSTORE_FILE_BASE64" | base64 --decode > android/app/keystore/nv_flutter_sdk_app_release.keystore
          chmod 600 android/app/keystore/nv_flutter_sdk_app_release.keystore

          cat > android/local.properties <<EOF
          NV_FLUTTER_SDKAPP_STORE_FILE=keystore/nv_flutter_sdk_app_release.keystore
          NV_FLUTTER_SDKAPP_STORE_PASSWORD=$KEYSTORE_PASSWORD
          NV_FLUTTER_SDKAPP_KEY_ALIAS=$KEY_ALIAS
          NV_FLUTTER_SDKAPP_KEY_PASSWORD=$KEY_PASSWORD
          EOF

          chmod 600 android/local.properties

          echo "✅ Firebase & signing files prepared"

      # ============================================================
      # STEP 9️⃣  Build Android APK 🏗️
      # ============================================================
      - name: 🏗 Build Android APK
        run: |
          set -e

          if [ "$BUILD_TYPE" = "release" ]; then
            flutter build apk --release --no-tree-shake-icons
          else
            flutter build apk --debug --no-tree-shake-icons
          fi

      # ============================================================
      # STEP 🔟  Rename APK 📛
      # ============================================================
      - name: 🏷 Rename APK with plugin version
        if: env.BUILD_TYPE == 'release'
        run: |
          set -e

          APK_DIR=build/app/outputs/flutter-apk
          ORIGINAL_APK="$APK_DIR/app-release.apk"

          if [ ! -f "$ORIGINAL_APK" ]; then
            echo "❌ APK not found"
            ls -lh "$APK_DIR"
            exit 1
          fi

          VERSIONED_APK="$APK_DIR/flutter_release_${PLUGIN_VERSION}_(${GITHUB_RUN_NUMBER}).apk"
          mv "$ORIGINAL_APK" "$VERSIONED_APK"

          echo "✅ Final APK:"
          ls -lh "$APK_DIR"

      # ============================================================
      # STEP 1️⃣1️⃣  Upload Artifacts 📤
      # ============================================================
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ env.BUILD_TYPE }}-v${{ env.PLUGIN_VERSION }}
          path: nv_flutter_sdk_app/build/app/outputs/flutter-apk/

      # ============================================================
      # STEP 1️⃣2️⃣  Upload Release APK to S3 ☁️
      # ============================================================
      - name: ☁️ Upload APK to S3 (release only)
        if: env.BUILD_TYPE == 'release'
        run: |
          set -e
          shopt -s nullglob

          APK_DIR=build/app/outputs/flutter-apk
          apks=("$APK_DIR"/*.apk)

          if [ ${#apks[@]} -eq 0 ]; then
            echo "❌ No APK found to upload"
            exit 1
          fi

          for apk in "${apks[@]}"; do
            APK_NAME=$(basename "$apk")
            S3_KEY="${{ github.event.repository.name }}/$APK_NAME"

            echo "☁️ Uploading $APK_NAME to s3://$S3_BUCKET/$S3_KEY"
            aws s3 cp "$apk" "s3://$S3_BUCKET/$S3_KEY" --only-show-errors

          done

