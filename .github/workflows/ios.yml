name: 🍎 Flutter CI – iOS Release (Production Ready)

run-name: 🧱 Build iOS (Release)

on:
  push:
    branches: [ stage ]
    paths:
      - "flutter_notifyvisitors/nv_flutter_sdk_app/ios/**"
      - "flutter_notifyvisitors/nv_flutter_sdk_app/lib/**"
      - "flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.yaml"
      - "flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.lock"
      - ".github/workflows/ios.yml"

# --------------------------------------------------------------------
# 📂 GLOBAL WORKING DIRECTORY (Flutter App Root)
# --------------------------------------------------------------------
defaults:
  run:
    working-directory: nv_flutter_sdk_app

jobs:
  ios-build-release:
    name: 📱 Build & Upload iOS App (TestFlight)
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      APP_SCHEME: "Runner"
      WORKSPACE: "Runner.xcworkspace"
      CONFIGURATION: "Release"
      DEVELOPMENT_TEAM: "4JW4924F8P"

      NV_BRAND_ID: ${{ vars.NV_BRAND_ID }}
      NV_BRAND_ENCRYPTION_KEY: ${{ vars.NV_BRAND_ENCRYPTION_KEY }} 

      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_ISSUER_ID }}
      IOS_APP_STORE_API_AUTHKEY_BASE64: ${{ secrets.IOS_APP_STORE_API_AUTHKEY_BASE64 }}

      APPLE_DISTRIBUTION_P12_B64: ${{ secrets.IOS_APPLE_DISTRIBUTION_P12_B64 }}
      APPLE_DISTRIBUTION_P12_PASSWORD: ${{ secrets.IOS_APPLE_DISTRIBUTION_P12_PASSWORD }}
      RELEASE_PROFILE_B64: ${{ secrets.IOS_RELEASE_PROFILE_B64 }}
      RELEASE_PROFILE_SERVICE_EXT_B64: ${{ secrets.IOS_RELEASE_PROFILE_SERVICE_EXT_B64 }}
      GOOGLESERVICE_INFO_B64: ${{ secrets.IOS_GOOGLESERVICE_INFO_B64 }}

    steps:
      # ============================================================
      # STEP 1️⃣  Checkout Source Code 📥 
      # ============================================================
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

       
      # ============================================================
      # STEP 3️⃣  Generate Runtime Secrets XCConfig 🔧
      # ============================================================
      - name: 🔧 Generate iOS Secrets XCConfig
        run: |
          set -e

          echo "NV_BRAND_ID=${NV_BRAND_ID}" > ios/Flutter/nvSecrets.xcconfig
          echo "NV_BRAND_ENCRYPTION_KEY=${NV_BRAND_ENCRYPTION_KEY}" >> ios/Flutter/nvSecrets.xcconfig

          echo "✅ Generated ios/Flutter/nvSecrets.xcconfig"

      # ============================================================
      # STEP 4️⃣  Install Flutter SDK 🐦
      # ============================================================
      - name: 🧰 Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable
          cache: true

      # ============================================================
      # STEP 5️⃣  Cache Flutter Packages ♻️
      # ============================================================
      - name: ♻️ Cache Flutter Pub Packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-cache-${{ runner.os }}-${{ hashFiles('flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.lock') }}

      # ============================================================
      # STEP 6️⃣  Install Flutter Dependencies 📦
      # ============================================================
      - name: 📦 Flutter Pub Get
        run: flutter pub get

      # ============================================================
      # STEP 7️⃣  Install CocoaPods 📚
      # ============================================================
      - name: 📚 Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # ============================================================
      # STEP 8️⃣  Install Certificates & Profiles 🔐
      # ============================================================
      - name: 🔐 Install certificates & provisioning profiles
        run: |
          set -e
          mkdir -p ios/certs

          echo "$APPLE_DISTRIBUTION_P12_B64" | base64 --decode > ios/certs/AppleDistribution.p12
          echo "$RELEASE_PROFILE_B64" | base64 --decode > ios/certs/app.mobileprovision
          echo "$RELEASE_PROFILE_SERVICE_EXT_B64" | base64 --decode > ios/certs/ext.mobileprovision

          ls -lh ios/certs

          chmod 600 ios/certs/*

      # ============================================================
      # STEP 9️⃣  Setup macOS Keychain 🔑
      # ============================================================
      - name: 🔑 Setup macOS Keychain
        run: |
          set -e
          KEYCHAIN_NAME=build.keychain

          ls -lh ios/certs/AppleDistribution.p12

          security create-keychain -p "$APPLE_DISTRIBUTION_P12_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_NAME"
          security list-keychains -s "$KEYCHAIN_NAME"
          security default-keychain -s "$KEYCHAIN_NAME"
          security unlock-keychain -p "$APPLE_DISTRIBUTION_P12_PASSWORD" "$KEYCHAIN_NAME"

          echo "📥 Importing Distribution Certificate..."
          security import ios/certs/AppleDistribution.p12 \
            -k "$KEYCHAIN_NAME" \
            -P "$APPLE_DISTRIBUTION_P12_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$APPLE_DISTRIBUTION_P12_PASSWORD" \
            "$KEYCHAIN_NAME"

      # -------------------------------------------------
      # 9️⃣ Install Provisioning Profiles
      # -------------------------------------------------
      - name: 📄 Install Provisioning Profiles
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp ios/certs/*.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/
     
      # ============================================================
      # STEP 🔟  Inject GoogleService-Info.plist 🔥
      # ============================================================
      - name: 🔥 Inject Firebase GoogleService Info
        run: |
          echo "${{ secrets.IOS_GOOGLESERVICE_INFO_B64 }}" | base64 --decode \
            > ios/Runner/GoogleService-Info.plist

      # ============================================================
      # STEP 1️⃣1️⃣  Archive & Export IPA 📦
      # ============================================================
      - name: 📦 Archive & Export IPA
        run: |
          cd ios
          mkdir -p build

          cp ../ExportOptions.plist ExportOptions.plist

          security find-identity -v -p codesigning build.keychain
          ls ~/Library/MobileDevice/Provisioning\ Profiles

          echo "🔍 MAIN PROFILE DETAILS:"
          security cms -D -i certs/app.mobileprovision | grep -A5 Name

          echo "🔍 CERTS IN PROFILE:"
          security cms -D -i certs/app.mobileprovision | grep -A10 DeveloperCertificates

          ARCHIVE_PATH="$PWD/build/$APP_SCHEME.xcarchive"

          xcodebuild clean \
            -workspace "$WORKSPACE" \
            -scheme "$APP_SCHEME" \
            -configuration "$CONFIGURATION"

          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$APP_SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution"

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$PWD/build/export" \
            -exportOptionsPlist ExportOptions.plist

          ls -la build/export/*.ipa 

      # ============================================================
      # STEP 1️⃣2️⃣  Upload IPA Artifact 📤
      # ============================================================
      - name: 📤 Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-build
          path: flutter_notifyvisitors/nv_flutter_sdk_app/ios/build/export/*.ipa

      # ============================================================
      # STEP 1️⃣3️⃣  Upload IPA to TestFlight 🚀
      # ============================================================
      - name: 🚀 Upload IPA to TestFlight
        run: |
          set -e

          echo "$IOS_APP_STORE_API_AUTHKEY_BASE64" | base64 --decode > AuthKey.p8

          KEY_CONTENT=$(awk '{printf "%s\\n", $0}' AuthKey.p8 | sed 's/"/\\"/g')

          cat > fastlane_api_key.json <<EOF
          {
            "key_id": "$IOS_APP_STORE_CONNECT_API_KEY_ID",
            "issuer_id": "$IOS_APP_STORE_CONNECT_ISSUER_ID",
            "key": "$KEY_CONTENT",
            "in_house": false
          }
          EOF

          sudo gem install fastlane -N

          fastlane deliver \
            --api_key_path fastlane_api_key.json \
            --ipa ios/build/export/*.ipa \
            --skip_screenshots \
            --skip_metadata \
            --run_precheck_before_submit false \
            --force \
            --verbose
            
