name: 🚀 Flutter CI – iOS Release (Enterprise & Production Ready)

on:
  push:
    branches: [ stage ]
    paths:
      - "flutter_notifyvisitors/nv_flutter_sdk_app/ios/**"
      - "flutter_notifyvisitors/nv_flutter_sdk_app/lib/**"
      - "flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.yaml"
      - "flutter_notifyvisitors/nv_flutter_sdk_app/pubspec.lock"
      - ".github/workflows/ios.yml"

# --------------------------------------------------------------------
# GLOBAL WORKING DIRECTORY (Fixes almost everything)
# --------------------------------------------------------------------
defaults:
  run:
    working-directory: flutter_notifyvisitors/nv_flutter_sdk_app

jobs:
  ios-build-release:
    name: 📱 Build & Upload iOS App (TestFlight)
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      APP_SCHEME: "Runner"
      WORKSPACE: "Runner.xcworkspace"
      CONFIGURATION: "Release"
      DEVELOPMENT_TEAM: "4JW4924F8P"
      KEYCHAIN_NAME: "build.keychain-db"

      # App Store Connect Keys
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
    # -------------------------------------------------
    # 1. Checkout Source Code
    # -------------------------------------------------
    - name: 📁 Checkout Source Code
      uses: actions/checkout@v4

    # -------------------------------------------------
    # 2. Install Flutter SDK
    # -------------------------------------------------
    - name: 🛠 Install Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: "3.35.7"
        channel: stable
        cache: true

    # -------------------------------------------------
    # 3. Cache Flutter Packages
    # -------------------------------------------------
    - name: 💾 Cache Flutter Pub Packages
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: pub-cache-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

    - name: 📦 Flutter Pub Get
      run: flutter pub get

    # -------------------------------------------------
    # 4. Install CocoaPods
    # -------------------------------------------------
    - name: 📚 Install CocoaPods Dependencies
      run: |
        cd ios
        pod install --repo-update

    # -------------------------------------------------
    # 5. Auto-Increment Build Number
    # -------------------------------------------------
    - name: 🔢 Auto-Increment Build Number
      run: |
        BUILD_NUMBER="${{ github.run_number }}"
        plutil -replace CFBundleVersion -string "$BUILD_NUMBER" ios/Runner/Info.plist

    # -------------------------------------------------
    # 6. Decrypt Signing Files
    # -------------------------------------------------
    - name: 🔐 Decrypt Certificates & Profiles
      env:
        CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      run: |
        mkdir -p ios/certs
        for FILE in appleDistribution.p12 nvFlutterTestApp_Main_Target_Release.mobileprovision nvFlutterTestApp_Ext_Target_Release.mobileprovision; do
          openssl aes-256-cbc -k "$CERT_PASSWORD" \
            -in "pf_ios/${FILE}.enc" -out "ios/certs/${FILE}" -d
        done

    # -------------------------------------------------
    # 7. macOS Keychain Setup
    # -------------------------------------------------
    - name: 🔑 Setup macOS Keychain
      env:
        CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      run: |
        security create-keychain -p "$CERT_PASSWORD" "$KEYCHAIN_NAME"
        security default-keychain -s "$KEYCHAIN_NAME"
        security unlock-keychain -p "$CERT_PASSWORD" "$KEYCHAIN_NAME"

        security import ios/certs/appleDistribution.p12 \
          -k "$KEYCHAIN_NAME" -P "$CERT_PASSWORD" -T /usr/bin/codesign

        security set-key-partition-list -S apple-tool:,apple: \
          -s -k "$CERT_PASSWORD" "$KEYCHAIN_NAME"

    # -------------------------------------------------
    # 8. Install Provisioning Profiles
    # -------------------------------------------------
    - name: 📝 Install Provisioning Profiles
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        cp ios/certs/*.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

    # -------------------------------------------------
    # 9. Flutter Debug Build (Validation)
    # -------------------------------------------------
    - name: 🧪 Flutter iOS Debug Build (Validation)
      run: flutter build ios --debug --no-codesign

    # -------------------------------------------------
    # 10. Install xcpretty
    # -------------------------------------------------
    - name: 📦 Install xcpretty
      run: gem install xcpretty --no-document || true

    # -------------------------------------------------
    # 11. Archive & Export IPA
    # -------------------------------------------------
    - name: 📦 Archive & Export IPA
      run: |
        cd ios
        mkdir -p build

        echo "🧹 Cleaning..."
        xcodebuild clean -workspace "$WORKSPACE" -scheme "$APP_SCHEME" -configuration "$CONFIGURATION"

        # IMPORTANT FIX — Correct path because pf_ios is above ios/
        cp ../pf_ios/ExportOptions.plist ExportOptions.plist

        ARCHIVE_PATH="$PWD/build/$APP_SCHEME.xcarchive"

        echo "🚀 Archiving..."
        xcodebuild -workspace "$WORKSPACE" \
          -scheme "$APP_SCHEME" \
          -configuration "$CONFIGURATION" \
          -sdk iphoneos \
          -archivePath "$ARCHIVE_PATH" \
          DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          archive | xcpretty

        echo "📤 Exporting IPA..."
        xcodebuild -exportArchive \
          -archivePath "$ARCHIVE_PATH" \
          -exportPath "$PWD/build/export" \
          -exportOptionsPlist ExportOptions.plist

        ls -la build/export/*.ipa

    # -------------------------------------------------
    # 12. Upload to TestFlight
    # -------------------------------------------------
    - name: 🚀 Upload IPA to TestFlight
      run: |
        echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > AuthKey.p8

        KEY_CONTENT=$(awk '{printf "%s\\n", $0}' AuthKey.p8 | sed 's/"/\\"/g')

        cat > fastlane_api_key.json <<EOF
        {
          "key_id": "$APP_STORE_CONNECT_API_KEY_ID",
          "issuer_id": "$APP_STORE_CONNECT_ISSUER_ID",
          "key": "$KEY_CONTENT",
          "in_house": false
        }
        EOF

        sudo gem install fastlane -N

        fastlane deliver \
          --api_key_path fastlane_api_key.json \
          --ipa ios/build/export/*.ipa \
          --skip_screenshots \
          --skip_metadata \
          --run_precheck_before_submit false \
          --force \
          --verbose

    # -------------------------------------------------
    # 13. Upload IPA Artifact
    # -------------------------------------------------
    - name: 📁 Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flutter-ios-ipa
        path: ios/build/export/*.ipa
