plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def enableProguardInReleaseBuilds = true
def enableSeparateBuildPerCPUArchitecture = true

def localProps = new Properties()
def localPropsFile = rootProject.file("local.properties")
if (localPropsFile.exists()) {
    localProps.load(new FileInputStream(localPropsFile))
}
def nvBrandId = localProps.getProperty("NV_BRAND_ID", "0")
def nvSecretKey = localProps.getProperty("NV_BRAND_ENCRYPTION_KEY", "")
android {
    namespace = "com.notifyvisitors.flutter.sdkapp"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.notifyvisitors.flutter.sdkapp"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        buildConfigField "int", " nvBrandID", nvBrandId
        buildConfigField "String", "nvSecretKey", "\"${nvSecretKey}\""
    }

    signingConfigs {
        release {
            if (localProps.getProperty('NV_FLUTTER_SDKAPP_STORE_FILE') != null) {
                storeFile file(localProps['NV_FLUTTER_SDKAPP_STORE_FILE'])
                storePassword localProps['NV_FLUTTER_SDKAPP_STORE_PASSWORD']
                keyAlias localProps['NV_FLUTTER_SDKAPP_KEY_ALIAS']
                keyPassword localProps['NV_FLUTTER_SDKAPP_KEY_PASSWORD']
            }
        }
    }

    buildTypes {
        release {
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            } else {
                println("⚠️ Release signingConfig not found. APK will NOT be signed.")
            }
            // minifyEnabled enableProguardInReleaseBuilds
            minifyEnabled true
            shrinkResources true
        }
    }


}

flutter {
    source = "../.."
}
